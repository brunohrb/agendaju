<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda Ju 🌸</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ec4899">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Agenda Ju">
  <link rel="apple-touch-icon" href="assets/icon.png">
  <link rel="icon" href="assets/icon.png" type="image/png">

  <!-- Fontes -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ══════════════════════════════════════════
       TELA DE LOGIN
  ══════════════════════════════════════════ -->
  <div id="login-screen">
    <div class="login-blob lb1"></div>
    <div class="login-blob lb2"></div>

    <div class="login-card">
      <div class="login-icon">
        <img src="assets/icon.png" alt="Agenda Ju" id="login-img" onerror="this.style.display='none';document.getElementById('login-emoji').style.display='flex'">
        <div id="login-emoji" class="login-emoji" style="display:none">🌸</div>
      </div>
      <h1>Agenda Ju</h1>
      <p class="login-sub">Sua organização pessoal</p>

      <form id="login-form" autocomplete="on">
        <div class="field-group">
          <label>Usuário</label>
          <div class="field-wrap">
            <span class="field-icon">👤</span>
            <input type="text" id="f-user" placeholder="usuário" autocomplete="username" required>
          </div>
        </div>
        <div class="field-group">
          <label>Senha</label>
          <div class="field-wrap">
            <span class="field-icon">🔒</span>
            <input type="password" id="f-pass" placeholder="senha" autocomplete="current-password" required>
            <button type="button" class="eye-btn" id="eye-btn" onclick="App.toggleEye()">👁</button>
          </div>
        </div>
        <p id="login-err" class="err-msg" style="display:none"></p>
        <button type="submit" class="btn-pink btn-full" id="login-btn">Entrar</button>
      </form>

      <p class="login-footer">Feito com amor 🌸</p>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       APP PRINCIPAL
  ══════════════════════════════════════════ -->
  <div id="app" class="hidden">

    <!-- Overlay mobile sidebar -->
    <div id="nav-overlay" class="nav-overlay hidden" onclick="App.closeSidebar()"></div>

    <!-- ── SIDEBAR ── -->
    <aside id="sidebar">
      <div class="sb-head">
        <div class="sb-logo">
          <img src="assets/icon.png" alt="" class="sb-img" onerror="this.style.display='none'">
          <span class="sb-emoji">🌸</span>
          <div>
            <strong>Agenda Ju</strong>
            <small>Minha organização</small>
          </div>
        </div>
        <button class="sb-close" onclick="App.closeSidebar()">✕</button>
      </div>

      <nav class="sb-nav">
        <a class="nav-item active" data-page="dashboard"  onclick="App.go('dashboard')">  <span>🏠</span> Início       </a>
        <a class="nav-item"        data-page="agenda"     onclick="App.go('agenda')">     <span>📅</span> Agenda       </a>
        <a class="nav-item"        data-page="lembretes"  onclick="App.go('lembretes')">  <span>🔔</span> Lembretes    </a>
        <a class="nav-item"        data-page="notas"      onclick="App.go('notas')">      <span>📝</span> Notas        </a>
        <a class="nav-item"        data-page="mercado"    onclick="App.go('mercado')">    <span>🛒</span> Mercado      </a>
        <a class="nav-item"        data-page="habitos"    onclick="App.go('habitos')">    <span>🌱</span> Hábitos      </a>
        <a class="nav-item"        data-page="financas"   onclick="App.go('financas')">   <span>💰</span> Finanças     </a>
        <a class="nav-item"        data-page="cofre"      onclick="App.go('cofre')">      <span>🔒</span> Cofre        </a>
        <a class="nav-item"        data-page="config"     onclick="App.go('config')">     <span>⚙️</span> Configurações</a>
      </nav>

      <div class="sb-foot">
        <button class="btn-logout" onclick="App.logout()">🚪 Sair</button>
        <small>Feito com amor 🌸</small>
      </div>
    </aside>

    <!-- ── CONTEÚDO PRINCIPAL ── -->
    <div class="main-wrap">

      <!-- Header -->
      <header class="app-header">
        <button class="menu-btn" onclick="App.openSidebar()">☰</button>
        <div class="header-center">
          <h2 id="page-title">Início</h2>
          <span id="today-label" class="today-label"></span>
        </div>
        <div class="header-right">
          <button class="icon-btn" onclick="App.go('lembretes')" title="Lembretes">🔔</button>
          <div class="user-av" id="user-av">J</div>
        </div>
      </header>

      <!-- Páginas -->
      <main class="app-main">
        <section id="pg-dashboard" class="page active"><div class="page-inner" id="c-dashboard"></div></section>
        <section id="pg-agenda"    class="page hidden"> <div class="page-inner" id="c-agenda"></div></section>
        <section id="pg-lembretes" class="page hidden"> <div class="page-inner" id="c-lembretes"></div></section>
        <section id="pg-notas"     class="page hidden"> <div class="page-inner" id="c-notas"></div></section>
        <section id="pg-mercado"   class="page hidden"> <div class="page-inner" id="c-mercado"></div></section>
        <section id="pg-habitos"   class="page hidden"> <div class="page-inner" id="c-habitos"></div></section>
        <section id="pg-financas"  class="page hidden"> <div class="page-inner" id="c-financas"></div></section>
        <section id="pg-cofre"     class="page hidden"> <div class="page-inner" id="c-cofre"></div></section>
        <section id="pg-config"    class="page hidden"> <div class="page-inner" id="c-config"></div></section>
      </main>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       MODAL GLOBAL
  ══════════════════════════════════════════ -->
  <div id="modal-bg" class="modal-bg hidden" onclick="App.closeModalBg(event)">
    <div class="modal-box" id="modal-box">
      <button class="modal-x" onclick="App.closeModal()">✕</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toasts"></div>

  <!-- Scripts -->
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="app.js"></script>
</body>
</html>

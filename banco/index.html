<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>BancoJu 💳</title>
  <meta name="theme-color" content="#6366f1">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- LOGIN / CADASTRO -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-blob b1"></div>
    <div class="auth-blob b2"></div>

    <div class="auth-card">
      <div class="brand">
        <div class="brand-logo">💳</div>
        <h1>BancoJu</h1>
        <p>Seu banco digital simples</p>
      </div>

      <div class="tabs">
        <button class="tab active" data-tab="login">Entrar</button>
        <button class="tab" data-tab="signup">Criar conta</button>
      </div>

      <!-- LOGIN -->
      <form id="form-login" class="auth-form">
        <label>Número da conta</label>
        <input type="text" id="login-account" placeholder="Ex: 00001-5" required>
        <label>Senha (4 dígitos)</label>
        <input type="password" id="login-pass" placeholder="••••" maxlength="4" inputmode="numeric" required>
        <p class="err" id="login-err"></p>
        <button type="submit" class="btn-primary">Entrar</button>
      </form>

      <!-- CADASTRO -->
      <form id="form-signup" class="auth-form hidden">
        <label>Nome completo</label>
        <input type="text" id="su-name" placeholder="Seu nome" required>
        <label>CPF</label>
        <input type="text" id="su-cpf" placeholder="000.000.000-00" maxlength="14" required>
        <label>Senha (4 dígitos)</label>
        <input type="password" id="su-pass" placeholder="••••" maxlength="4" inputmode="numeric" required>
        <p class="err" id="su-err"></p>
        <button type="submit" class="btn-primary">Abrir conta grátis</button>
      </form>
    </div>
  </div>

  <!-- APP -->
  <div id="app" class="hidden">
    <header class="top">
      <div class="top-user">
        <div class="avatar" id="avatar">J</div>
        <div class="top-txt">
          <small>Olá,</small>
          <strong id="user-name">-</strong>
        </div>
      </div>
      <button class="icon-btn" id="btn-logout" title="Sair">🚪</button>
    </header>

    <section class="card-balance">
      <div class="cb-top">
        <span>Saldo disponível</span>
        <button class="eye" id="eye-btn" type="button">👁</button>
      </div>
      <h2 id="balance">R$ 0,00</h2>
      <div class="cb-info">
        <div>
          <small>Conta</small>
          <strong id="acc-number">00000-0</strong>
        </div>
        <div>
          <small>Agência</small>
          <strong>0001</strong>
        </div>
      </div>
    </section>

    <section class="actions">
      <button class="act" data-act="deposit">
        <span>💰</span>
        <small>Depositar</small>
      </button>
      <button class="act" data-act="withdraw">
        <span>🏧</span>
        <small>Sacar</small>
      </button>
      <button class="act" data-act="transfer">
        <span>💸</span>
        <small>Transferir</small>
      </button>
      <button class="act" data-act="statement">
        <span>📄</span>
        <small>Extrato</small>
      </button>
    </section>

    <section class="history">
      <div class="h-head">
        <h3>Últimas movimentações</h3>
        <button class="link" id="btn-clear-hist" type="button">Limpar</button>
      </div>
      <ul id="tx-list" class="tx-list"></ul>
      <p id="empty-hist" class="empty">Nenhuma movimentação ainda</p>
    </section>
  </div>

  <!-- MODAL -->
  <div id="modal-bg" class="modal-bg hidden">
    <div class="modal">
      <button class="modal-x" id="modal-x" type="button">✕</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
